name: CI/CD Suricato

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'

jobs:

  frontend-build-and-test:
    name: Frontend - Build and Test
    runs-on: ubuntu-latest
    # Só executa se houver mudanças no frontend
    # if: |
    #  contains(join(github.event.commits.*.modified, ' '), 'frontend/') ||
    #  contains(join(github.event.commits.*.added, ' '), 'frontend/')

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      # Configura o Node.js 20 com cache do npm
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      # Instala as dependências do frontend
      - name: Install dependencies
        run: npm install
        working-directory: ./frontend

      # Faz o build do frontend
      - name: Build front-end
        run: npm run build
        working-directory: ./frontend

  frontend-docker:
    name: Frontend - Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: frontend-build-and-test

    # Só executa no push para main (não em pull request)
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Faz o build e push da imagem do frontend
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            kketillen/suricato-web:1.0.0
            kketillen/suricato-web:latest


  backend-build-and-test:
    name: Backend - Build and Test
    runs-on: ubuntu-latest
    # Só executa se houver mudanças no backend
    # if: |
    #  contains(join(github.event.commits.*.modified, ' '), 'backend/') ||
    #  contains(join(github.event.commits.*.added, ' '), 'backend/')

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: suricato_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
  
      - name: Checkout code
        uses: actions/checkout@v4

      # Configura o Java 21 com cache do Maven
      - name: Set up Java 21 and Maven
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # Instala as dependências e compila o projeto
      - name: Install dependencies and compile
        run: mvn clean install -DskipTests
        working-directory: ./backend

      # Executa os testes do backend
      - name: Run backend tests
        run: mvn test
        working-directory: ./backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/suricato_db
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

  backend-docker:
    name: Backend - Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: backend-build-and-test

    # Só executa no push para main (não em pull request)
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    
      - name: Checkout code
        uses: actions/checkout@v4

      # Loga no Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Faz o build e push da imagem do backend
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            kketillen/suricato-backend:1.0.0
            kketillen/suricato-backend:latest
